<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player</title>
    <!-- Font Awesome for Spotify-like icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* CSS Reset & Variable Definitions */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Container Layout */
        .container {
            display: flex;
            height: calc(100vh - 90px);
            padding: 8px;
            gap: 8px;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bg-card {
            background-color: #121212;
            border-radius: 8px;
            padding: 20px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 20px;
            height: 40px;
            color: #b3b3b3;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #ffffff;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .library {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .lib-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b3b3b3;
            margin-bottom: 20px;
        }

        .lib-header div {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
        }

        /* Main Content Panel */
        .main-content {
            flex: 1;
            background-color: #121212;
            border-radius: 8px;
            overflow-y: auto;
            padding: 24px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .chevron-buttons button {
            background-color: rgba(0,0,0,0.7);
            border: none;
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            margin-right: 8px;
            cursor: not-allowed;
        }

        .auth-buttons button {
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-signup {
            background-color: transparent;
            color: #b3b3b3;
        }

        .btn-signup:hover {
            color: #ffffff;
            transform: scale(1.04);
        }

        .btn-login {
            background-color: #ffffff;
            color: #000000;
        }

        .btn-login:hover {
            transform: scale(1.04);
        }

        /* Grid Cards Layout */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .playlist-card {
            background-color: #181818;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            position: relative;
        }

        .playlist-card:hover {
            background-color: #282828;
        }

        .playlist-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .playlist-card h4 {
            font-size: 1rem;
            margin-bottom: 8px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .playlist-card p {
            font-size: 0.85rem;
            color: #b3b3b3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Bottom Music Player Bar */
        .player-bar {
            height: 90px;
            background-color: #000000;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .current-track {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 25%;
        }

        .current-track img {
            width: 56px;
            height: 56px;
            border-radius: 4px;
        }

        .track-info h5 {
            font-size: 0.9rem;
            cursor: pointer;
        }

        .track-info h5:hover {
            text-decoration: underline;
        }

        .track-info p {
            font-size: 0.75rem;
            color: #b3b3b3;
            cursor: pointer;
        }

        .track-info p:hover {
            text-decoration: underline;
            color: #ffffff;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 40%;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 24px;
            color: #b3b3b3;
        }

        .control-buttons i:hover {
            color: #ffffff;
            cursor: pointer;
        }

        .btn-play {
            background-color: #ffffff;
            color: #000000 !important;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-play:hover {
            transform: scale(1.06);
        }

        .playback-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            font-size: 0.75rem;
            color: #b3b3b3;
        }

        .progress-slider {
            flex: 1;
            height: 4px;
            background-color: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-slider::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background-color: #1db954;
            border-radius: 2px;
        }

        .progress-slider:hover::after {
            background-color: #1ed760;
        }

        .volume-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 25%;
            justify-content: flex-end;
            color: #b3b3b3;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background-color: #4d4d4d;
            border-radius: 2px;
            position: relative;
        }

        .volume-slider::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 70%;
            background-color: #ffffff;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="bg-card">
                <ul class="nav-menu">
                    <li class="nav-item" style="color: #fff;"><i class="fa-solid fa-house"></i> Home</li>
                    <li class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Search</li>
                </ul>
            </div>

            <div class="bg-card library">
                <div class="lib-header">
                    <div><i class="fa-solid fa-book"></i> Your Library</div>
                    <i class="fa-solid fa-plus" style="cursor: pointer;"></i>
                </div>
                <!-- Mini playlists can go here -->
                <ul class="nav-menu">
                    <li class="nav-item" style="font-weight: normal; font-size: 0.9rem;">Create your first playlist</li>
                    <li class="nav-item" style="font-weight: normal; font-size: 0.9rem;">Browse podcasts</li>
                </ul>
            </div>
        </aside>

        <!-- Main Dashboard content -->
        <main class="main-content">
            <header class="header-nav">
                <div class="chevron-buttons">
                    <button><i class="fa-solid fa-chevron-left"></i></button>
                    <button><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="auth-buttons">
                    <button class="btn-signup">Sign up</button>
                    <button class="btn-login">Log in</button>
                </div>
            </header>

            <!-- Playlists Section -->
            <h2 class="section-title">Spotify Playlists</h2>
            <div class="card-grid">
                <!-- Card 1 -->
                <div class="playlist-card">
                    <img src="https://unsplash.com" alt="Today's Top Hits">
                    <h4>Today's Top Hits</h4>
